<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10100f" />
    <title>ChipMate</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">ChipMate v0.1</p>
        <h1>Reamer RPM</h1>
      </div>
      <span id="connectionStatus" class="status-pill">Checking</span>
    </header>

    <main class="shell">
      <section class="tool-panel" aria-labelledby="assistantTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Assistant</p>
            <h2 id="assistantTitle">Guided setup</h2>
          </div>
          <button id="resetButton" class="ghost-button" type="button">Reset</button>
        </div>

        <form id="assistantForm" class="ask-form">
          <label for="messageInput">Question</label>
          <textarea
            id="messageInput"
            name="message"
            rows="3"
            autocomplete="off"
            spellcheck="false"
            placeholder="how fast should I spin a .503 reamer"
          ></textarea>
          <button class="primary-button" type="submit">Ask</button>
        </form>

        <div class="quick-row" aria-label="Examples">
          <button type="button" data-example="how fast should I spin a .503 reamer">.503 reamer</button>
          <button type="button" data-example=".375 carbide reamer aluminum mill coolant">Full setup</button>
        </div>

        <div id="stateSummary" class="state-grid" aria-live="polite"></div>
        <div id="followups" class="followups" aria-live="polite"></div>
        <div id="answer" class="answer" aria-live="polite"></div>
      </section>

      <section class="tool-panel source-panel" aria-labelledby="searchTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">SQLite FTS5</p>
            <h2 id="searchTitle">Source search</h2>
          </div>
        </div>
        <form id="searchForm" class="search-form">
          <label for="searchInput">Search</label>
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="aluminum hss coolant" />
            <button class="secondary-button" type="submit">Find</button>
          </div>
        </form>
        <div id="searchResults" class="search-results"></div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
