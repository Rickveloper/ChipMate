<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f7f8" />
    <title>ChipMate</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="ChipMate">
        <span class="brand-mark">CM</span>
        <span>ChipMate</span>
      </div>
      <div class="top-actions">
        <button id="newButton" class="plain-button" type="button">New</button>
        <span id="connectionStatus" class="status-pill">Checking</span>
      </div>
    </header>

    <main class="shell">
      <section class="hero" aria-labelledby="appTitle">
        <p class="eyebrow">Machinist Copilot</p>
        <h1 id="appTitle">ChipMate</h1>

        <form id="assistantForm" class="composer">
          <label class="sr-only" for="messageInput">Machining question</label>
          <textarea
            id="messageInput"
            name="message"
            rows="2"
            autocomplete="off"
            spellcheck="true"
            placeholder="Ask about 1/4-20 tap drills, true position, 6061 speeds, G54 offsets..."
          ></textarea>
          <div id="typingSuggestions" class="typing-suggestions" aria-label="Typing suggestions" hidden></div>
          <div class="composer-actions">
            <button id="askButton" class="send-button" type="submit">Ask</button>
          </div>
        </form>

        <div id="categoryRail" class="category-rail" aria-label="Machining categories">
          <button type="button" data-slug="speeds-feeds" data-category="Speeds & Feeds">Speeds &amp; Feeds</button>
          <button type="button" data-slug="tooling" data-category="Tooling">Tooling</button>
          <button type="button" data-slug="materials" data-category="Materials">Materials</button>
          <button type="button" data-slug="gdt" data-category="GD&T">GD&amp;T</button>
          <button type="button" data-slug="inspection" data-category="Inspection">Inspection</button>
          <button type="button" data-slug="blueprint-reading" data-category="Blueprint Reading">Blueprint Reading</button>
          <button type="button" data-slug="manual-machining" data-category="Manual Machining">Manual Machining</button>
          <button type="button" data-slug="cnc" data-category="CNC">CNC</button>
          <button type="button" data-slug="formulas" data-category="Formulas">Formulas</button>
          <button type="button" data-slug="tap-drill-charts" data-category="Tap Drill Charts">Tap Drill Charts</button>
          <button type="button" data-slug="reamers" data-category="Reamers">Reamers</button>
          <button type="button" data-slug="threading" data-category="Threading">Threading</button>
        </div>

        <section class="memory-section" aria-label="Saved searches">
          <article id="recentPanel" class="memory-panel" hidden>
            <div class="memory-panel-header">
              <h3>Recent Searches</h3>
              <button id="clearRecentButton" class="plain-button compact-button" type="button">Clear</button>
            </div>
            <div id="recentList" class="memory-list"></div>
          </article>

          <article id="favoritesPanel" class="memory-panel" hidden>
            <div class="memory-panel-header">
              <h3>Favorites</h3>
              <button id="clearFavoritesButton" class="plain-button compact-button" type="button">Clear</button>
            </div>
            <div id="favoritesList" class="memory-list"></div>
          </article>
        </section>

        <section id="offlineStoragePanel" class="offline-storage" aria-labelledby="offlineStorageTitle">
          <div class="offline-storage-header">
            <div>
              <h3 id="offlineStorageTitle">Offline Storage</h3>
              <p id="offlineStorageStatus" class="offline-storage-status">Checking cache status</p>
            </div>
          </div>

          <dl class="offline-storage-list">
            <div class="offline-storage-item">
              <dt>App shell</dt>
              <dd>~52 KB</dd>
              <dd id="appShellCacheState" class="cache-state">Checking</dd>
            </div>
            <div class="offline-storage-item">
              <dt>Quick reference pack</dt>
              <dd>estimated under 5 MB</dd>
              <dd id="quickReferenceCacheState" class="cache-state">Checking</dd>
            </div>
            <div class="offline-storage-item">
              <dt>Machinery&rsquo;s Handbook PDF</dt>
              <dd>31 MB</dd>
              <dd id="handbookCacheState" class="cache-state">Checking</dd>
            </div>
            <div class="offline-storage-item total">
              <dt>Total with handbook</dt>
              <dd>about 31 MB+</dd>
              <dd></dd>
            </div>
          </dl>

          <div class="offline-actions">
            <button id="cacheAppShellButton" class="plain-button offline-button" type="button">Cache app shell</button>
            <button id="cacheQuickReferenceButton" class="plain-button offline-button" type="button">Cache quick-reference pack</button>
            <button id="cacheHandbookButton" class="plain-button offline-button" type="button">Cache handbook PDF</button>
            <button id="clearOfflineCacheButton" class="plain-button offline-button danger-button" type="button">Clear offline cache</button>
          </div>
        </section>
      </section>

      <section id="answer" class="responses" aria-live="polite"></section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
